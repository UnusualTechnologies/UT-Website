{{ define "main" }}
<div class="page-gradient">

  <section class="section careers-job-single">
    <a href="{{ "careers/" | relURL }}" class="back-link">&larr; All Positions</a>

    <h1>{{ .Title }}</h1>

    <div class="careers-job-content">
      {{ .Content }}
    </div>

    {{ partial "email-link.html" (dict "email" "careers@unusualtechnologies.com" "text" "Apply Now" "class" "btn careers-apply-btn" "mode" "action") }}

  </section>

</div>
{{ end }}
